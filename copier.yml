# Copier configuration for the pyarnes project template.
# Rendered with:
#
#   uvx copier copy gh:Cognitivemesh/pyarnes <destination>
#
# Every question has a default so a developer can hit Enter through all of
# them. No author name or email is asked — pyproject.toml omits `authors`
# and the developer fills it in later if they want.

_min_copier_version: "9.0.0"
_subdirectory: template

# `_subdirectory: template` already scopes what Copier sees. The excludes below
# are kept as belt-and-braces / documentation for monorepo-only paths. Do NOT
# add "src/**" here — that would also mask the template's own
# `src/{{project_module}}/` source tree, leaving generated projects empty.
_exclude:
  - ".pyarnes"
  - ".pyarnes/**"
  - ".claude"
  - ".claude/**"
  - "uv.lock"
  - ".jj/**"
  - "specs/**"    # spec/PR drafts — monorepo-internal, never shipped to adopters
  # Dev-time hooks ship only when the adopter opts into `enable_dev_hooks`.
  - "{% if not enable_dev_hooks %}.claude/hooks{% endif %}"
  - "{% if not enable_dev_hooks %}.claude/hooks/**{% endif %}"
  - "{% if not enable_dev_hooks %}.claude/settings.json{% endif %}"
  - "{% if not enable_dev_hooks %}tests/bench{% endif %}"
  - "{% if not enable_dev_hooks %}tests/bench/**{% endif %}"
  # Per-shape example scripts — render only the subdir matching adopter_shape.
  - "{% if adopter_shape != 'pii-redaction' %}scripts/examples/pii-redaction{% endif %}"
  - "{% if adopter_shape != 'pii-redaction' %}scripts/examples/pii-redaction/**{% endif %}"
  - "{% if adopter_shape != 's3-sweep' %}scripts/examples/s3-sweep{% endif %}"
  - "{% if adopter_shape != 's3-sweep' %}scripts/examples/s3-sweep/**{% endif %}"
  - "{% if adopter_shape != 'rtm-toggl-agile' %}scripts/examples/rtm-toggl-agile{% endif %}"
  - "{% if adopter_shape != 'rtm-toggl-agile' %}scripts/examples/rtm-toggl-agile/**{% endif %}"

# ---------------------------------------------------------------------------
# Prompts
# ---------------------------------------------------------------------------
project_name:
  type: str
  help: "Project name (used in pyproject.toml and docs, defaults to the destination directory name)"
  default: "{{ _copier_conf.dst_path.name }}"

project_description:
  type: str
  help: "One-line project description"
  default: "A pyarnes-based project"

python_version:
  type: str
  help: "Minimum Python version required"
  default: "3.13"
  choices:
    - "3.13"
    - "3.14"

pyarnes_ref:
  type: str
  help: "Which pyarnes git ref to pin dependencies to (branch, tag, or commit)"
  default: "main"

adopter_shape:
  type: str
  help: "Which reference shape best fits this project?"
  default: "blank"
  choices:
    - "blank"
    - "pii-redaction"
    - "s3-sweep"
    - "rtm-toggl-agile"

enable_dev_hooks:
  type: bool
  help: "Wire pyarnes into Claude Code hooks to harness the coding agent during development? (Adopter C pattern)"
  default: "{{ adopter_shape == 'rtm-toggl-agile' }}"

allowed_claude_tools:
  type: yaml
  help: "Claude Code tools the pre-tool hook allows"
  default:
    - Read
    - Write
    - Edit
    - Glob
    - Grep
    - Bash
    - TodoWrite

# ---------------------------------------------------------------------------
# Computed values — not asked, just derived
# ---------------------------------------------------------------------------
project_module:
  type: str
  when: false
  default: "{{ project_name | lower | replace('-', '_') | replace(' ', '_') }}"

current_year:
  type: str
  when: false
  default: "{{ '%Y' | strftime }}"

# ---------------------------------------------------------------------------
# Post-scaffold hook
# ---------------------------------------------------------------------------
_tasks:
  - uv run --no-sync tasks post_scaffold
