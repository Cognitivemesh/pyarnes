version: 2

updates:
  # Python deps via uv — workspace root.
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      uv:
        patterns: ["*"]

  # GitHub Actions used by CI / docs workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns: ["*"]
