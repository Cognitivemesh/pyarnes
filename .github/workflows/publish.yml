name: publish

"on":
  push:
    tags:
      - pyarnes-tasks-v*

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: build and publish pyarnes-tasks
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyarnes-tasks
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync --frozen

      - name: Build pyarnes-tasks
        run: uv build --package pyarnes-tasks

      - name: Publish to PyPI
        run: uv publish
