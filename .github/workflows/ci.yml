name: ci

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: lint + typecheck + test + security
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version-file: .python-version
          enable-cache: true

      - name: Sync workspace
        run: uv sync --frozen

      - name: Run composite CI task
        # Runs: format:check + lint + typecheck + test:cov + security
        # (defined in packages/tasks/src/pyarnes_tasks/cli.py COMPOSITE_TASKS)
        run: uv run tasks ci
