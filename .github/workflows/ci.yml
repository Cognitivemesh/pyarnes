name: ci

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: lint + typecheck + test + security
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync --frozen

      - name: Run composite CI task
        # Runs: format:check + lint + typecheck + test:cov + security
        # (defined in plugins/ci.py — the CompositePlugin's `subtasks`)
        run: uv run tasks ci

      - name: Code-audit gate (HIGH findings fail CI)
        # `audit:build` parses the configured roots once; `audit:check` runs
        # every detector and exits non-zero on any HIGH finding (god nodes
        # only flag, but circular imports / unused dependencies / boundary
        # violations / complexity hotspots / duplicate blocks all promote).
        run: |
          uv run tasks audit:build
          uv run tasks audit:check
