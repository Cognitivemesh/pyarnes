name: docs

"on":
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/docs.yml'

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: mkdocs build --strict
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync --frozen

      - name: Validate redirect targets
        run: uv run tasks check:redirects

      - name: Build docs (strict)
        # Strict mode fails on any broken internal link, missing nav target,
        # or unresolved redirect — catches bad PRs before merge.
        run: uv run mkdocs build --strict

      - name: Install lychee
        uses: taiki-e/install-action@v2
        with:
          tool: lychee

      - name: Link-check rendered site
        # Fail on any broken links in the rendered static site output.
        run: lychee --base . --verbose ./site
