site_name: pyarnes
site_description: A minimal agentic harness engineering template for Python
site_url: https://cognitivemesh.github.io/pyarnes/
repo_url: https://github.com/Cognitivemesh/pyarnes
repo_name: Cognitivemesh/pyarnes

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Distribution model: getting-started/distribution.md
      - Use as template: template.md
  - Architecture:
      - Overview: architecture/overview.md
      - Error Taxonomy: architecture/errors.md
      - Lifecycle: architecture/lifecycle.md
      - Meta-use (agent-on-agent): architecture/meta-use.md
  - Packages:
      - pyarnes-core: packages/core.md
      - pyarnes-harness: packages/harness.md
      - pyarnes-guardrails: packages/guardrails.md
      - pyarnes-bench: packages/bench.md
      - pyarnes-tasks: packages/tasks.md
  - Code Reference:
      - Core Types: api/types.md
      - Errors: api/errors.md
      - Lifecycle: api/lifecycle.md
      - Agent Loop: api/loop.md
      - Guardrails: api/guardrails.md
      - Tool Registry: api/registry.md
      - Capture: api/capture.md
      - Logging: api/logging.md
  - Development:
      - Tasks: development/tasks.md
      - Testing: development/testing.md
      - Extending pyarnes: development/extending.md
      - Evolving pyarnes: development/evolving.md
      - Evolving the template: development/template.md
      - Release workflow: development/release.md
