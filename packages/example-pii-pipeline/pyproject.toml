[project]
name = "example-pii-pipeline"
version = "0.1.0"
description = "Reference Adopter A for pyarnes: PDF → PII redaction → markdown + TF-IDF"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.13"
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3",
    "Typing :: Typed",
]
dependencies = [
    "pyarnes-core",
    "pyarnes-harness",
    "pyarnes-guardrails",
    "typer>=0.15",
]

[project.scripts]
pii-pipeline = "pii_pipeline.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pii_pipeline"]
