[project]
name = "example-s3-sweep"
version = "0.1.0"
description = "Reference Adopter B for pyarnes: S3 download-verify-delete pipeline"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.13"
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3",
    "Typing :: Typed",
]
dependencies = [
    "pyarnes-core",
    "pyarnes-harness",
    "pyarnes-guardrails",
    "typer>=0.15",
]

[project.scripts]
s3-sweeper = "s3_sweep.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/s3_sweep"]
