[project]
name = "pyarnes-bench"
version = "0.1.0"
description = "Evaluation and benchmarking toolkit for the pyarnes agentic harness."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.13"
authors = [{ name = "Cognitivemesh" }]
keywords = ["agentic", "harness", "eval", "benchmark", "testing"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

dependencies = [
    "pyarnes-core",
    "more-itertools>=10.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pyarnes_bench"]

[tool.uv.sources]
pyarnes-core = { workspace = true }
