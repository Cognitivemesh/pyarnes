[project]
name = "pyarnes-tasks"
version = "0.1.0"
description = "Cross-platform task runner for the pyarnes agentic harness — replaces Make."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.13"
authors = [{ name = "Cognitivemesh" }]
keywords = ["agentic", "harness", "tasks", "cli", "make"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

dependencies = []

[project.scripts]
tasks = "pyarnes_tasks.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pyarnes_tasks"]
