[project]
name = "pyarnes-harness"
version = "0.1.0"
description = "Runtime engine for the pyarnes agentic harness — agent loop, guardrails, tool registry, and capture."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.13"
authors = [{ name = "Cognitivemesh" }]
keywords = ["agentic", "harness", "loop", "guardrails", "tools"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

dependencies = [
    "pyarnes-core",
    "pyarnes-guardrails",
    "returns>=0.24",
    "toolz>=1.0",
    "more-itertools>=10.5",
    "funcy>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pyarnes_harness"]

[tool.uv.sources]
pyarnes-core = { workspace = true }
pyarnes-guardrails = { workspace = true }
