[project]
name = "example-rtm-toggl-agile"
version = "0.1.0"
description = "Reference Adopter C for pyarnes: RTM + Toggl → unified agile workspace"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.13"
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3",
    "Typing :: Typed",
]
dependencies = [
    "pyarnes-core",
    "pyarnes-harness",
    "pyarnes-guardrails",
    "pyarnes-bench",
    "typer>=0.15",
]

[project.scripts]
rtm-toggl-agile = "rtm_toggl_agile.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rtm_toggl_agile"]
