[project]
name = "pyarnes-api"
version = "0.1.0"
description = "OpenAPI REST interface for the pyarnes agentic harness."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.13"
authors = [{ name = "Cognitivemesh" }]
keywords = ["agentic", "harness", "api", "openapi", "fastapi"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

dependencies = [
    "pyarnes-core",
    "pyarnes-harness",
    "pyarnes-guardrails",
    "pyarnes-bench",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pyarnes_api"]

[tool.uv.sources]
pyarnes-core = { workspace = true }
pyarnes-harness = { workspace = true }
pyarnes-guardrails = { workspace = true }
pyarnes-bench = { workspace = true }
